<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seleccionando colores</title>
</head>

<body>

<script>

    var color;

    color = prompt('escoge color, color 1, color 2, color 3: ', '1, 2 ó 3');

    if (color == "1")
    {
        document.bgColor = '#8000FF'; // morado
    }
    else if (color == "2")
    {
        document.bgColor = '#00CC00'; // verde
    }
    else if (color == "3")
    {
        document.bgColor = '#0066FF'; // azul
    }
    else
    {
        document.write('no este jugando');
    }

</script>

</body>
</html>
