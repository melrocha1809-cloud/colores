<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seleccionando colores</title>
</head>

<body>

<script>

    var color;

    color = prompt(
        'Escoge color: 1, 2, 3, 4, 5 o 6'
    );

    if (color == "1")
    {
        document.bgColor = "#6A0DAD"; 
    }
    else if (color == "2")
    {
        document.bgColor = "#008000";
    }
    else if (color == "3")
    {
        document.bgColor = "#0000FF"; 
    }
    else if (color == "4")
    {
        document.bgColor = "#FFFF00"; 
    }
    else if (color == "5")
    {
        document.bgColor = "#FF0000";
    }
    else if (color == "6")
    {
        document.bgColor = "#FFA500";
    }
    else
    {
        document.write("No está jugando");
    }

</script>

</body>
</html>
